<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMANTAP Kemenag Bontang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0fdf4; }
        .tab-active { border-bottom: 2px solid #16a34a; color: #16a34a; font-weight: 600; }
        .tab-inactive { color: #6b7280; }
        .tab-inactive:hover { color: #16a34a; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, setDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseModules = { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, setDoc, getDocs };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Icons (SVG strings for zero dependency)
        const Icons = {
            Home: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>,
            Briefcase: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>,
            FileText: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>,
            Users: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>,
            LogOut: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
        };

        const SATKER_LIST = ["Kepala Kemenag", "TU", "Pendis", "Bimas", "ZAWA", "KUA Barat", "KUA Selatan", "KUA Utara"];
        const DEFAULT_ADMINS = SATKER_LIST.map(satker => ({
            username: `admin_${satker.toLowerCase().replace(/\s+/g, '')}`,
            password: 'admin',
            role: 'admin',
            satker: satker,
            nama: `Admin ${satker}`
        }));

        function App() {
            const [fbStatus, setFbStatus] = useState('Initializing...');
            const [fbRefs, setFbRefs] = useState(null);
            
            // App Data States
            const [allUsers, setAllUsers] = useState([]);
            const [allDisposisi, setAllDisposisi] = useState([]);
            const [allLaporan, setAllLaporan] = useState([]);
            
            // Auth State
            const [currentUser, setCurrentUser] = useState(null);
            const [view, setView] = useState('login'); 

            // Initialize Firebase
            useEffect(() => {
                const initFirebase = async () => {
                    if (!window.firebaseModules) {
                        setTimeout(initFirebase, 100);
                        return;
                    }
                    try {
                        const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore } = window.firebaseModules;
                        const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{"projectId":"dummy"}';
                        const firebaseConfig = JSON.parse(configStr);
                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        const db = getFirestore(app);
                        const appId = typeof __app_id !== 'undefined' ? __app_id : 'simantap-bontang';

                        setFbRefs({ db, appId });

                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }

                        onAuthStateChanged(auth, (user) => {
                            if (user) {
                                setFbStatus('Connected');
                            } else {
                                setFbStatus('Disconnected');
                            }
                        });

                    } catch (error) {
                        console.error("Firebase init error:", error);
                        setFbStatus('Error initializing');
                    }
                };
                initFirebase();
            }, []);

            // Fetch Data
            useEffect(() => {
                if (fbStatus !== 'Connected' || !fbRefs) return;
                const { db, appId } = fbRefs;
                const { collection, onSnapshot, setDoc, doc, getDocs } = window.firebaseModules;

                const usersCol = collection(db, 'artifacts', appId, 'public', 'data', 'users');
                const disCol = collection(db, 'artifacts', appId, 'public', 'data', 'edisposisi');
                const lapCol = collection(db, 'artifacts', appId, 'public', 'data', 'laporankinerja');

                // Seed Admins if table is completely empty
                const seedAdmins = async () => {
                    const snap = await getDocs(usersCol);
                    if (snap.empty) {
                        for (const admin of DEFAULT_ADMINS) {
                            await setDoc(doc(usersCol, admin.username), admin);
                        }
                    }
                };
                seedAdmins();

                const unsubUsers = onSnapshot(usersCol, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setAllUsers(data);
                }, (err) => console.error(err));

                const unsubDis = onSnapshot(disCol, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setAllDisposisi(data);
                }, (err) => console.error(err));

                const unsubLap = onSnapshot(lapCol, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setAllLaporan(data);
                }, (err) => console.error(err));

                return () => { unsubUsers(); unsubDis(); unsubLap(); };
            }, [fbStatus, fbRefs]);

            const handleLogin = (username, password) => {
                const user = allUsers.find(u => (u.username === username || u.nip === username) && u.password === password);
                if (user) {
                    if (user.role === 'pegawai' && user.status === 'pending') {
                        alert("Akun Anda masih dalam proses verifikasi oleh Admin Satker.");
                        return;
                    }
                    setCurrentUser(user);
                    setView('dashboard');
                } else {
                    alert("Username/NIP atau Password salah.");
                }
            };

            const handleRegister = async (userData) => {
                if (!fbRefs) return;
                const { db, appId } = fbRefs;
                const { collection, addDoc } = window.firebaseModules;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'users'), {
                        ...userData,
                        role: 'pegawai',
                        status: 'pending'
                    });
                    alert("Pendaftaran berhasil! Silakan tunggu verifikasi admin.");
                    setView('login');
                } catch (e) {
                    alert("Terjadi kesalahan.");
                }
            };

            const logout = () => {
                setCurrentUser(null);
                setView('login');
            };

            if (fbStatus === 'Initializing...') return <div className="min-h-screen flex items-center justify-center font-bold text-green-700">Memuat SIMANTAP Kemenag...</div>;

            return (
                <div className="min-h-screen bg-green-50 text-gray-800">
                    <nav className="bg-green-700 text-white shadow-md">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between h-16 items-center">
                                <div className="flex items-center space-x-3">
                                    <div className="w-10 h-10 bg-white rounded-full flex items-center justify-center font-bold text-green-700 text-xl">S</div>
                                    <div>
                                        <h1 className="text-xl font-bold leading-none">SIMANTAP</h1>
                                        <p className="text-xs text-green-200">Kemenag Bontang</p>
                                    </div>
                                </div>
                                {currentUser && (
                                    <div className="flex items-center space-x-4">
                                        <span className="text-sm hidden sm:block">Halo, {currentUser.nama} ({currentUser.satker})</span>
                                        <button onClick={logout} className="flex items-center space-x-1 hover:text-green-200 transition-colors">
                                            <Icons.LogOut /> <span className="text-sm">Keluar</span>
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        {view === 'login' && <LoginScreen onLogin={handleLogin} onGoRegister={() => setView('register')} />}
                        {view === 'register' && <RegisterScreen onRegister={handleRegister} onGoLogin={() => setView('login')} />}
                        {view === 'dashboard' && currentUser?.role === 'admin' && (
                            <AdminDashboard 
                                user={currentUser} 
                                fbRefs={fbRefs} 
                                users={allUsers} 
                                disposisi={allDisposisi} 
                                laporan={allLaporan} 
                            />
                        )}
                        {view === 'dashboard' && currentUser?.role === 'pegawai' && (
                            <PegawaiDashboard 
                                user={currentUser} 
                                fbRefs={fbRefs} 
                                users={allUsers} 
                                disposisi={allDisposisi} 
                                laporan={allLaporan} 
                            />
                        )}
                    </main>
                </div>
            );
        }

        function LoginScreen({ onLogin, onGoRegister }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');

            const submit = (e) => {
                e.preventDefault();
                onLogin(username, password);
            };

            return (
                <div className="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg border border-green-100 mt-10">
                    <h2 className="text-2xl font-bold text-center text-green-800 mb-6">Masuk Akun</h2>
                    <form onSubmit={submit} className="space-y-4">
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Username Admin / NIP Pegawai</label>
                            <input required type="text" value={username} onChange={e => setUsername(e.target.value)} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all" />
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Password</label>
                            <input required type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all" />
                        </div>
                        <button type="submit" className="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2.5 rounded-lg shadow-md transition-colors mt-2">
                            Masuk
                        </button>
                    </form>
                    <p className="mt-6 text-center text-sm text-gray-600">
                        Belum punya akun pegawai? <button onClick={onGoRegister} className="text-green-600 font-semibold hover:underline">Daftar di sini</button>
                    </p>
                </div>
            );
        }

        function RegisterScreen({ onRegister, onGoLogin }) {
            const [formData, setFormData] = useState({
                nama: '', nip: '', jabatan: '', pangkat: '', satker: SATKER_LIST[0], password: ''
            });

            const submit = (e) => {
                e.preventDefault();
                onRegister(formData);
            };

            return (
                <div className="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg border border-green-100">
                    <h2 className="text-2xl font-bold text-center text-green-800 mb-6">Pendaftaran Pegawai</h2>
                    <form onSubmit={submit} className="space-y-4">
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
                            <input required type="text" value={formData.nama} onChange={e => setFormData({...formData, nama: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" />
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">NIP (Gunakan sebagai Username)</label>
                            <input required type="text" value={formData.nip} onChange={e => setFormData({...formData, nip: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" />
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Jabatan</label>
                            <input required type="text" value={formData.jabatan} onChange={e => setFormData({...formData, jabatan: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" />
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Pangkat/Golongan</label>
                            <input required type="text" value={formData.pangkat} onChange={e => setFormData({...formData, pangkat: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" />
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Satker</label>
                            <select value={formData.satker} onChange={e => setFormData({...formData, satker: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none bg-white">
                                {SATKER_LIST.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Password</label>
                            <input required type="password" value={formData.password} onChange={e => setFormData({...formData, password: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" />
                        </div>
                        <button type="submit" className="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2.5 rounded-lg shadow-md mt-2">Daftar</button>
                    </form>
                    <p className="mt-6 text-center text-sm text-gray-600">
                        Sudah punya akun? <button onClick={onGoLogin} className="text-green-600 font-semibold hover:underline">Masuk di sini</button>
                    </p>
                </div>
            );
        }

        function AdminDashboard({ user, fbRefs, users, disposisi, laporan }) {
            const [activeTab, setActiveTab] = useState('home');

            // Filter data only for this admin's satker
            const myPegawai = users.filter(u => u.satker === user.satker && u.role === 'pegawai');
            const myDisposisi = disposisi.filter(d => d.satker === user.satker);
            const myLaporan = laporan.filter(l => l.satker === user.satker);

            const tabs = [
                { id: 'home', label: 'Home', icon: Icons.Home },
                { id: 'edisposisi', label: 'E-Disposisi', icon: Icons.Briefcase },
                { id: 'laporan', label: 'Laporan Kinerja', icon: Icons.FileText },
                { id: 'pegawai', label: 'Daftar Pegawai', icon: Icons.Users },
            ];

            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div className="flex border-b border-gray-200 bg-gray-50 overflow-x-auto">
                        {tabs.map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                                className={`flex items-center space-x-2 px-6 py-4 text-sm font-medium whitespace-nowrap transition-colors ${activeTab === tab.id ? 'tab-active bg-white' : 'tab-inactive'}`}>
                                <tab.icon /> <span>{tab.label}</span>
                            </button>
                        ))}
                    </div>
                    <div className="p-6">
                        {activeTab === 'home' && <AdminHome pegawai={myPegawai} disposisi={myDisposisi} laporan={myLaporan} />}
                        {activeTab === 'edisposisi' && <AdminEdisposisi fbRefs={fbRefs} pegawai={myPegawai} disposisi={myDisposisi} />}
                        {activeTab === 'laporan' && <AdminLaporan fbRefs={fbRefs} laporan={myLaporan} />}
                        {activeTab === 'pegawai' && <AdminPegawai fbRefs={fbRefs} pegawai={myPegawai} />}
                    </div>
                </div>
            );
        }

        function AdminHome({ pegawai, disposisi, laporan }) {
            const activePegawai = pegawai.filter(p => p.status === 'approved');
            const totalTugas = disposisi.length;
            const selesaiTugas = disposisi.filter(d => d.status === 'selesai').length;
            const totalLaporan = laporan.length;
            
            return (
                <div className="space-y-6">
                    <h3 className="text-xl font-bold text-gray-800 border-b pb-2">Dashboard Satker</h3>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-blue-50 p-6 rounded-xl border border-blue-100 flex flex-col items-center justify-center">
                            <span className="text-4xl font-bold text-blue-600">{activePegawai.length}</span>
                            <span className="text-sm text-blue-800 font-medium mt-1">Pegawai Aktif Terdaftar</span>
                        </div>
                        <div className="bg-green-50 p-6 rounded-xl border border-green-100 flex flex-col items-center justify-center">
                            <span className="text-4xl font-bold text-green-600">{selesaiTugas}/{totalTugas}</span>
                            <span className="text-sm text-green-800 font-medium mt-1">Disposisi Selesai</span>
                        </div>
                        <div className="bg-purple-50 p-6 rounded-xl border border-purple-100 flex flex-col items-center justify-center">
                            <span className="text-4xl font-bold text-purple-600">{totalLaporan}</span>
                            <span className="text-sm text-purple-800 font-medium mt-1">Total Laporan Kinerja</span>
                        </div>
                    </div>
                    
                    <div className="mt-8">
                        <h4 className="font-semibold text-gray-700 mb-4 text-lg">Matriks Kinerja per Pegawai</h4>
                        <div className="overflow-x-auto">
                            <table className="min-w-full bg-white border rounded-lg text-sm text-left">
                                <thead className="bg-green-700 text-white border-b">
                                    <tr>
                                        <th className="p-3">Nama Pegawai / Jabatan</th>
                                        <th className="p-3 text-center">E-Disposisi (Selesai/Total)</th>
                                        <th className="p-3 text-center">Total Laporan Kinerja</th>
                                        <th className="p-3">Status / Perbaikan</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {activePegawai.map(p => {
                                        const pDisposisi = disposisi.filter(d => d.pegawaiId === p.id);
                                        const pLaporan = laporan.filter(l => l.pegawaiId === p.id);
                                        
                                        const tSelesai = pDisposisi.filter(d => d.status === 'selesai').length;
                                        const tTotal = pDisposisi.length;
                                        const lTotal = pLaporan.length;
                                        const lKurangBaik = pLaporan.filter(l => l.penilaianAdmin === 'Kurang Baik').length;
                                        const pPending = pDisposisi.filter(d => d.status === 'proses' || d.status === 'pending').length;

                                        return (
                                            <tr key={p.id} className="border-b hover:bg-gray-50">
                                                <td className="p-3">
                                                    <div className="font-bold text-gray-800">{p.nama}</div>
                                                    <div className="text-xs text-gray-500">{p.jabatan}</div>
                                                </td>
                                                <td className="p-3 text-center">
                                                    <span className={`font-semibold ${tSelesai === tTotal && tTotal > 0 ? 'text-green-600' : 'text-gray-800'}`}>
                                                        {tSelesai} / {tTotal}
                                                    </span>
                                                    {pPending > 0 && <div className="text-xs text-orange-500">{pPending} menunggu</div>}
                                                </td>
                                                <td className="p-3 text-center font-semibold text-gray-800">
                                                    {lTotal} Laporan
                                                </td>
                                                <td className="p-3">
                                                    {lKurangBaik > 0 ? (
                                                        <span className="inline-block bg-red-100 text-red-700 px-2 py-1 rounded text-xs font-semibold">
                                                            {lKurangBaik} Perlu Perbaikan
                                                        </span>
                                                    ) : (
                                                        <span className="inline-block bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-semibold">
                                                            Kinerja Baik
                                                        </span>
                                                    )}
                                                </td>
                                            </tr>
                                        );
                                    })}
                                    {activePegawai.length === 0 && (
                                        <tr><td colSpan="4" className="p-4 text-center text-gray-500">Belum ada pegawai aktif (disetujui).</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function AdminEdisposisi({ fbRefs, pegawai, disposisi }) {
            const [form, setForm] = useState({ pegawaiId: '', jenis: 'biasa', deskripsi: '', deadline: '', linkSurat: '' });
            const { db, appId } = fbRefs;
            const { collection, addDoc, doc, updateDoc } = window.firebaseModules;

            const activePegawai = pegawai.filter(p => p.status === 'approved');

            const buatTugas = async (e) => {
                e.preventDefault();
                if(!form.pegawaiId) return alert("Pilih pegawai!");
                const peg = activePegawai.find(p => p.id === form.pegawaiId);
                
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'edisposisi'), {
                    ...form,
                    pegawaiName: peg.nama,
                    satker: peg.satker,
                    status: 'pending',
                    penilaianAdmin: ''
                });
                alert("Tugas berhasil diberikan!");
                setForm({ pegawaiId: '', jenis: 'biasa', deskripsi: '', deadline: '', linkSurat: '' });
            };

            const nilaiTugas = async (id, nilai) => {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'edisposisi', id), { penilaianAdmin: nilai });
            };

            return (
                <div className="space-y-8">
                    <div className="bg-green-50 p-6 rounded-xl border border-green-200">
                        <h3 className="text-lg font-bold text-green-800 mb-4">Buat Disposisi Baru</h3>
                        <form onSubmit={buatTugas} className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label className="block text-xs font-semibold text-gray-700 mb-1">Pilih Pegawai</label>

        function PegawaiDashboard({ user, fbRefs, users, disposisi, laporan }) {

            const myDisposisi = disposisi.filter(d => d.pegawaiId === user.id);
            const myLaporan = laporan.filter(l => l.pegawaiId === user.id);
            const rekanSatker = users.filter(u => u.satker === user.satker && u.role === 'pegawai' && u.status === 'approved');

            const tabs = [
                { id: 'home', label: 'Home', icon: Icons.Home },
                { id: 'edisposisi', label: 'E-Disposisi', icon: Icons.Briefcase },
                { id: 'laporan', label: 'Laporan Kinerja', icon: Icons.FileText },
                { id: 'pegawai', label: 'Daftar Pegawai', icon: Icons.Users },
            ];

            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div className="flex border-b border-gray-200 bg-gray-50 overflow-x-auto">

                            <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                                className={`flex items-center space-x-2 px-6 py-4 text-sm font-medium whitespace-nowrap transition-colors ${activeTab === tab.id ? 'tab-active bg-white' : 'tab-inactive'}`}>

                    <div className="p-6">

                        {activeTab === 'edisposisi' && <PegawaiEdisposisi fbRefs={fbRefs} disposisi={myDisposisi} />}
                        {activeTab === 'laporan' && <PegawaiLaporan fbRefs={fbRefs} user={user} laporan={myLaporan} />}
                        {activeTab === 'pegawai' && <PegawaiDaftarRekan rekan={rekanSatker} />}
                    </div>
                </div>
            );
        }

        function PegawaiEdisposisi({ fbRefs, disposisi }) {
            const { db, appId } = fbRefs;
            const { doc, updateDoc } = window.firebaseModules;
            const [modalSelesai, setModalSelesai] = useState(null); // holds task ID
            const [formSelesai, setFormSelesai] = useState({ waktuPengerjaan: '', tempat: '', kendala: '', linkBukti: '' });

            const ubahStatus = async (id, status) => {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'edisposisi', id), { status });
            };

            const submitSelesai = async (e) => {
                e.preventDefault();
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'edisposisi', modalSelesai), {
                    ...formSelesai,
                    status: 'selesai'
                });
                setModalSelesai(null);
                setFormSelesai({ waktuPengerjaan: '', tempat: '', kendala: '', linkBukti: '' });
            };

            return (
                <div>
                    <h3 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Tugas Disposisi Saya</h3>
                    <div className="space-y-4">
                        {disposisi.map(d => (
                            <div key={d.id} className={`border p-5 rounded-xl shadow-sm ${d.status === 'selesai' ? 'bg-green-50 border-green-200' : 'bg-white'}`}>
                                <div className="flex justify-between items-start mb-3">
                                    <div>
                                        <div className="flex items-center space-x-2">
                                            <span className={`px-2 py-0.5 rounded text-xs font-bold text-white ${d.jenis === 'penting' ? 'bg-red-500' : 'bg-blue-500'}`}>{d.jenis.toUpperCase()}</span>
                                            <h4 className="font-bold text-lg">{d.deskripsi}</h4>
                                        </div>
                                        <div className="text-sm text-gray-600 mt-1">Deadline: {d.deadline}</div>
                                        {d.linkSurat && <a href={d.linkSurat} target="_blank" className="text-xs text-blue-600 hover:underline inline-block mt-1">📄 Lihat Surat Tugas</a>}
                                    </div>
                                    <div className="text-right">
                                        <div className="text-xs font-semibold text-gray-500 mb-2">Status: {d.status.toUpperCase()}</div>
                                        {d.status === 'pending' && <button onClick={() => ubahStatus(d.id, 'proses')} className="bg-yellow-500 text-white px-4 py-1.5 rounded text-sm font-semibold shadow hover:bg-yellow-600">Mulai Proses</button>}
                                        {d.status === 'proses' && <button onClick={() => setModalSelesai(d.id)} className="bg-green-600 text-white px-4 py-1.5 rounded text-sm font-semibold shadow hover:bg-green-700">Tandai Selesai</button>}
                                        {d.status === 'selesai' && d.penilaianAdmin && (
                                            <div className={`mt-2 px-3 py-1 text-xs font-bold rounded inline-block ${d.penilaianAdmin === 'Sangat Baik' ? 'bg-green-200 text-green-800' : d.penilaianAdmin === 'Kurang Baik' ? 'bg-red-200 text-red-800' : 'bg-blue-200 text-blue-800'}`}>
                                                Nilai: {d.penilaianAdmin}
                                            </div>
                                        )}
                                    </div>
                                </div>
                                {modalSelesai === d.id && (
                                    <form onSubmit={submitSelesai} className="mt-4 pt-4 border-t border-gray-200 grid grid-cols-1 md:grid-cols-2 gap-4 bg-gray-50 p-4 rounded-lg">
                                        <div>
                                            <label className="block text-xs font-semibold mb-1">Waktu Pengerjaan</label>
                                            <input required type="text" value={formSelesai.waktuPengerjaan} onChange={e => setFormSelesai({...formSelesai, waktuPengerjaan: e.target.value})} placeholder="Cth: 2 Hari" className="w-full p-2 border rounded text-sm" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold mb-1">Tempat</label>
                                            <input required type="text" value={formSelesai.tempat} onChange={e => setFormSelesai({...formSelesai, tempat: e.target.value})} placeholder="Cth: Kantor KUA" className="w-full p-2 border rounded text-sm" />
                                        </div>
                                        <div className="md:col-span-2">
                                            <label className="block text-xs font-semibold mb-1">Kendala (Jika ada)</label>
                                            <textarea value={formSelesai.kendala} onChange={e => setFormSelesai({...formSelesai, kendala: e.target.value})} className="w-full p-2 border rounded text-sm" rows="1"></textarea>
                                        </div>
                                        <div className="md:col-span-2">
                                            <label className="block text-xs font-semibold mb-1">Link Bukti Dukung (Foto/Doc)</label>
                                            <input type="url" value={formSelesai.linkBukti} onChange={e => setFormSelesai({...formSelesai, linkBukti: e.target.value})} className="w-full p-2 border rounded text-sm" />
                                        </div>
                                        <div className="md:col-span-2 flex justify-end space-x-2">
                                            <button type="button" onClick={() => setModalSelesai(null)} className="px-4 py-2 border rounded text-sm font-semibold hover:bg-gray-100">Batal</button>

                                        </div>
                                    </form>
                                )}
                            </div>
                        ))}
                        {disposisi.length === 0 && <p className="text-gray-500 text-center py-8">Tidak ada tugas saat ini.</p>}
                    </div>
                </div>
            );

        function PegawaiLaporan({ fbRefs, user, laporan }) {

            const buatLaporan = async (e) => {
                e.preventDefault();
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'laporankinerja'), {
                    ...form,
                    pegawaiId: user.id,
                    pegawaiName: user.nama,
                    satker: user.satker,
                    tanggal: new Date().toISOString(),
                    penilaianAdmin: '',
                    rekomendasiAdmin: ''
                });
                alert("Laporan Kinerja berhasil dikirim!");
                setForm({ kerja: '', deskripsi: '', kendala: '', waktu: '', tempat: '', linkBukti: '' });

                <div className="space-y-8">

                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-gray-700 mb-1">Tempat</label>

                            </div>
                            <div className="md:col-span-2">
                                <label className="block text-xs font-semibold text-gray-700 mb-1">Kendala (Opsional)</label>
                                <input type="text" value={form.kendala} onChange={e => setForm({...form, kendala: e.target.value})} className="w-full p-2 border rounded" />
                            </div>
                            <div className="md:col-span-2">
                                <label className="block text-xs font-semibold text-gray-700 mb-1">Link Bukti Dukung</label>
                                <input type="url" value={form.linkBukti} onChange={e => setForm({...form, linkBukti: e.target.value})} className="w-full p-2 border rounded" />
                            </div>
                            <div className="md:col-span-2 flex justify-end">
                                <button type="submit" className="bg-blue-600 text-white px-6 py-2 rounded font-semibold shadow hover:bg-blue-700">Kirim Laporan</button>
                            </div>
                        </form>
                    </div>

                    <div>
                        <h3 className="text-lg font-bold text-gray-800 mb-4">Riwayat Laporan Kinerja</h3>
                        <div className="space-y-3">
                            {laporan.map(lap => (
                                <div key={lap.id} className="border p-4 rounded-lg shadow-sm bg-white flex flex-col md:flex-row justify-between gap-4">
                                    <div>
                                        <h4 className="font-bold text-gray-800">{lap.kerja}</h4>
                                        <p className="text-sm text-gray-600 mt-1">{lap.deskripsi}</p>
                                        <div className="text-xs text-gray-500 mt-2 flex space-x-4">
                                            <span>📅 {lap.waktu}</span>
                                            <span>📍 {lap.tempat}</span>
                                        </div>
                                    </div>
                                    <div className="w-full md:w-48 text-right">
                                        {lap.penilaianAdmin ? (
                                            <div className="text-sm">
                                                <div className="font-semibold mb-1">Nilai: <span className={lap.penilaianAdmin==='Kurang Baik'?'text-red-600':'text-green-600'}>{lap.penilaianAdmin}</span></div>
                                                {lap.rekomendasiAdmin && <div className="text-xs bg-red-50 p-1 border border-red-100 rounded text-left mt-1 text-red-800">Note: {lap.rekomendasiAdmin}</div>}
                                            </div>
                                        ) : <span className="text-xs text-gray-400 italic">Menunggu penilaian</span>}
                                    </div>
                                </div>
                            ))}
                            {laporan.length === 0 && <p className="text-gray-500 text-sm">Belum ada riwayat laporan.</p>}
                        </div>
                    </div>
                </div>
            );
        }

        function PegawaiDaftarRekan({ rekan }) {
            return (
                <div>
                    <h3 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Rekan Satker ({rekan.length} Pegawai)</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {rekan.map(p => (
                            <div key={p.id} className="flex items-center p-4 border rounded-xl shadow-sm bg-white">
                                <div className="w-12 h-12 bg-green-100 text-green-700 rounded-full flex items-center justify-center font-bold text-xl mr-4 uppercase">
                                    {p.nama.charAt(0)}
                                </div>
                                <div>
                                    <div className="font-bold text-gray-800">{p.nama}</div>
                                    <div className="text-xs text-gray-500 font-medium">{p.jabatan}</div>
                                    <div className="text-xs text-gray-400 mt-1">NIP: {p.nip}</div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
