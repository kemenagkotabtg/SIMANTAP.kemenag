<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMANTAP Cloud - Kemenag Bontang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .sidebar-active { background-color: rgba(21, 128, 61, 0.1); color: #15803d; border-right: 4px solid #15803d; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-800">

    <div id="app">
        <div id="main-container" class="min-h-screen flex items-center justify-center">
            <div id="loading-screen" class="flex flex-col items-center p-6 text-center">
                <div class="w-12 h-12 border-4 border-green-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-slate-500 font-bold">Sinkronisasi Cloud...</p>
                <p class="text-xs text-slate-400 mt-2 italic text-balance">Menghubungkan ke server pusat Kemenag Bontang</p>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed top-5 right-5 z-[9999]"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, addDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- KONFIGURASI FIREBASE ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'simantap-bontang-v1';

        // --- DATA AWAL ADMIN ---
        const ADMIN_LIST = [
            { id: 'admin-tu', nip: 'admin_tatausaha', name: 'Admin Tata Usaha', satker: 'Tata Usaha (TU)' },
            { id: 'admin-bimas', nip: 'admin_bimasislam', name: 'Admin Bimas Islam', satker: 'Bimas Islam' },
            { id: 'admin-pendis', nip: 'admin_pendis', name: 'Admin Pendidikan Islam', satker: 'Pendidikan Islam (Pendis)' },
            { id: 'admin-haji', nip: 'admin_haji', name: 'Admin Haji & Umrah', satker: 'Penyelenggara Haji & Umrah' },
            { id: 'admin-barat', nip: 'admin_kua_barat', name: 'Admin KUA Bontang Barat', satker: 'KUA Bontang Barat' },
            { id: 'admin-utara', nip: 'admin_kua_utara', name: 'Admin KUA Bontang Utara', satker: 'KUA Bontang Utara' },
            { id: 'admin-selatan', nip: 'admin_kua_selatan', name: 'Admin KUA Bontang Selatan', satker: 'KUA Bontang Selatan' }
        ];

        let state = {
            view: 'login',
            user: null,
            activeTab: 'home',
            users: [],
            tasks: [],
            reports: [],
            isAuthReady: false
        };

        // --- HELPER DATABASE ---
        const getCol = (name) => collection(db, 'artifacts', appId, 'public', 'data', name);
        const getDocRef = (name, id) => doc(db, 'artifacts', appId, 'public', 'data', name, id);

        // --- NOTIFIKASI ---
        window.showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-green-600' : 'bg-red-600';
            toast.className = `${bgColor} text-white px-6 py-3 rounded-xl shadow-2xl mb-3 flex items-center gap-2 animate-in slide-in-from-right duration-300`;
            toast.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" class="w-5 h-5"></i> <span class="text-sm font-medium">${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 3000);
        };

        // --- LOGIKA UTAMA & AUTENTIKASI ---
        async function initApp() {
            try {
                // Autentikasi terlebih dahulu (MANDATORY RULE 3)
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, async (fbUser) => {
                    if (fbUser) {
                        state.isAuthReady = true;
                        await ensureAdminAccounts();
                        setupRealtimeListeners();
                    }
                });
            } catch (err) {
                console.error("Auth Fail:", err);
            }
        }

        async function ensureAdminAccounts() {
            for (const adm of ADMIN_LIST) {
                const ref = getDocRef('users', adm.id);
                const snap = await getDoc(ref);
                if (!snap.exists()) {
                    await setDoc(ref, {
                        ...adm,
                        password: 'admin',
                        role: 'admin',
                        status: 'verified',
                        jabatan: 'Administrator Satker',
                        golongan: '-'
                    });
                }
            }
        }

        function setupRealtimeListeners() {
            // Listen Users
            onSnapshot(getCol('users'), (snap) => {
                state.users = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (state.user) {
                    const freshUser = state.users.find(u => u.id === state.user.id);
                    if (freshUser) {
                        state.user = freshUser;
                        if (freshUser.status === 'pending') state.view = 'pending';
                        if (freshUser.status === 'verified' && state.view === 'pending') state.view = 'dashboard';
                    }
                }
                render();
            }, (e) => console.error("User Sync Error:", e));

            // Listen Tasks
            onSnapshot(getCol('tasks'), (snap) => {
                state.tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            });

            // Listen Reports
            onSnapshot(getCol('reports'), (snap) => {
                state.reports = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            });
        }

        // --- AKSI USER ---
        window.handleLogin = (e) => {
            e.preventDefault();
            const nip = document.getElementById('l-nip').value;
            const pass = document.getElementById('l-pass').value;

            const found = state.users.find(u => u.nip === nip && u.password === pass);
            if (found) {
                state.user = found;
                state.view = found.status === 'pending' ? 'pending' : 'dashboard';
                state.activeTab = 'home';
                window.showToast(`Halo, ${found.name}`);
            } else {
                window.showToast('NIP atau Password salah!', 'error');
            }
            render();
        };

        window.handleRegister = async (e) => {
            e.preventDefault();
            const nip = document.getElementById('r-nip').value;
            if (state.users.some(u => u.nip === nip)) return window.showToast('NIP sudah ada!', 'error');

            const id = 'user-' + Date.now();
            const newUser = {
                id,
                name: document.getElementById('r-name').value,
                nip,
                satker: document.getElementById('r-satker').value,
                jabatan: document.getElementById('r-jabatan').value,
                golongan: document.getElementById('r-golongan').value,
                password: document.getElementById('r-pass').value,
                role: 'pegawai',
                status: 'pending'
            };

            await setDoc(getDocRef('users', id), newUser);
            window.showToast('Registrasi terkirim! Tunggu Admin.');
            state.view = 'login';
            render();
        };

        window.handleCreateTask = async (e) => {
            e.preventDefault();
            const task = {
                pegawaiId: document.getElementById('t-peg').value,
                name: document.getElementById('t-name').value,
                fileLink: document.getElementById('t-file').value,
                deadline: document.getElementById('t-date').value,
                satker: state.user.satker,
                status: 'Berjalan',
                buktiDukung: '',
                nilai: ''
            };
            await addDoc(getCol('tasks'), task);
            window.showToast('Disposisi berhasil dikirim');
            e.target.reset();
        };

        window.submitBukti = async (id) => {
            const link = document.getElementById(`b-${id}`).value;
            if(!link) return window.showToast('Isi link bukti!', 'error');
            await updateDoc(getDocRef('tasks', id), { buktiDukung: link, status: 'Selesai' });
            window.showToast('Tugas dilaporkan selesai');
        };

        window.nilaiTugas = async (id, v) => {
            await updateDoc(getDocRef('tasks', id), { nilai: v });
        };

        window.handleCreateReport = async (e) => {
            e.preventDefault();
            const rep = {
                pegawaiId: state.user.id,
                satker: state.user.satker,
                date: document.getElementById('rep-date').value,
                time: document.getElementById('rep-time').value,
                activity: document.getElementById('rep-act').value,
                buktiLink: document.getElementById('rep-link').value,
                penilaian: ''
            };
            await addDoc(getCol('reports'), rep);
            window.showToast('Laporan harian terkirim');
            e.target.reset();
        };

        window.nilaiLaporan = async (id, v) => {
            await updateDoc(getDocRef('reports', id), { penilaian: v });
        };

        window.verifUser = async (id, stat) => {
            if (stat === 'del') await deleteDoc(getDocRef('users', id));
            else await updateDoc(getDocRef('users', id), { status: 'verified' });
            window.showToast('Status pegawai diperbarui');
        };

        // --- RENDER ENGINE ---
        function render() {
            const root = document.getElementById('main-container');
            if (state.view === 'login') root.innerHTML = renderLogin();
            else if (state.view === 'register') root.innerHTML = renderRegister();
            else if (state.view === 'pending') root.innerHTML = renderPending();
            else root.innerHTML = renderDashboard();
            lucide.createIcons();
        }

        function renderLogin() {
            return `
            <div class="min-h-screen w-full flex items-center justify-center p-4 bg-green-900">
                <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden max-w-4xl w-full flex flex-col md:flex-row border border-green-800/20">
                    <div class="md:w-1/2 bg-green-700 p-12 text-white flex flex-col justify-center items-center text-center">
                        <div class="w-24 h-24 bg-white/20 backdrop-blur rounded-3xl flex items-center justify-center mb-6 border border-white/30">
                            <i data-lucide="shield-check" class="w-12 h-12 text-white"></i>
                        </div>
                        <h1 class="text-3xl font-black mb-2 tracking-tighter">SIMANTAP</h1>
                        <p class="text-green-100/70 text-sm font-medium">Sistem Manajemen Terpadu Pegawai<br>Kemenag Kota Bontang</p>
                    </div>
                    <div class="md:w-1/2 p-10 lg:p-14">
                        <h2 class="text-2xl font-bold text-slate-800 mb-8 tracking-tight">Login Portal</h2>
                        <form onsubmit="handleLogin(event)" class="space-y-5">
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">NIP / ID Admin</label>
                                <input id="l-nip" type="text" placeholder="Masukkan NIP Anda" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-green-500 outline-none transition-all" required>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Kata Sandi</label>
                                <input id="l-pass" type="password" placeholder="••••••••" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-green-500 outline-none transition-all" required>
                            </div>
                            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-green-900/20 transition-transform active:scale-95">Masuk Sekarang</button>
                        </form>
                        <div class="mt-8 pt-6 border-t border-slate-100 flex flex-col items-center gap-4">
                            <p class="text-xs text-slate-400">Pegawai baru? <button onclick="navigate('register')" class="text-green-600 font-bold hover:underline">Daftar Akun</button></p>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function renderRegister() {
            return `
            <div class="min-h-screen w-full flex items-center justify-center p-4 bg-slate-50">
                <div class="bg-white rounded-[2rem] shadow-xl p-8 lg:p-12 max-w-xl w-full border border-slate-200">
                    <h2 class="text-2xl font-black text-slate-800 mb-2">Pendaftaran Akun</h2>
                    <p class="text-slate-400 text-xs mb-8">Lengkapi data Anda dengan benar untuk verifikasi admin.</p>
                    <form onsubmit="handleRegister(event)" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input id="r-name" type="text" placeholder="Nama Lengkap" class="w-full px-4 py-3 bg-slate-50 border rounded-xl text-sm" required>
                            <input id="r-nip" type="text" placeholder="NIP" class="w-full px-4 py-3 bg-slate-50 border rounded-xl text-sm" required>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input id="r-satker" type="text" placeholder="Satuan Kerja (Isi Manual)" class="w-full px-4 py-3 bg-slate-50 border rounded-xl text-sm" required>
                            <input id="r-jabatan" type="text" placeholder="Jabatan" class="w-full px-4 py-3 bg-slate-50 border rounded-xl text-sm" required>
                        </div>
                        <input id="r-golongan" type="text" placeholder="Golongan (Contoh: III/d)" class="w-full px-4 py-3 bg-slate-50 border rounded-xl text-sm" required>
                        <input id="r-pass" type="password" placeholder="Buat Password" class="w-full px-4 py-3 bg-slate-50 border rounded-xl text-sm" required>
                        <button type="submit" class="w-full bg-green-600 text-white font-bold py-4 rounded-2xl shadow-lg mt-4">Kirim Pendaftaran</button>
                    </form>
                    <button onclick="navigate('login')" class="w-full mt-6 text-slate-400 text-xs font-medium hover:text-slate-600 transition-colors flex items-center justify-center gap-2">
                        <i data-lucide="arrow-left" class="w-3 h-3"></i> Kembali ke Login
                    </button>
                </div>
            </div>`;
        }

        function renderDashboard() {
            const isAdmin = state.user.role === 'admin';
            return `
            <div class="flex flex-col md:flex-row h-screen w-full overflow-hidden bg-slate-50">
                <!-- Sidebar Mobile & Desktop -->
                <aside class="w-full md:w-20 lg:w-64 bg-white border-b md:border-r flex md:flex-col justify-between md:justify-start">
                    <div class="p-4 md:p-6 md:border-b flex items-center justify-center lg:justify-start gap-3">
                        <div class="w-10 h-10 bg-green-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-green-200"><i data-lucide="layout-dashboard" class="w-5 h-5"></i></div>
                        <span class="hidden lg:block font-black text-green-800 text-lg tracking-tighter">SIMANTAP</span>
                    </div>
                    <nav class="flex md:flex-col flex-1 p-2 md:p-4 gap-1 overflow-x-auto md:overflow-x-visible">
                        ${renderNav('home', 'home', 'Beranda')}
                        ${renderNav('disposisi', 'send', 'Disposisi')}
                        ${renderNav('laporan', 'clipboard-list', 'Laporan')}
                        ${isAdmin ? renderNav('verif', 'user-check', 'Aktivasi') : ''}
                    </nav>
                    <button onclick="logout()" class="p-4 md:p-6 text-red-500 border-l md:border-l-0 md:border-t flex items-center justify-center lg:justify-start gap-3 hover:bg-red-50 transition-colors">
                        <i data-lucide="log-out" class="w-5 h-5"></i><span class="hidden lg:block font-bold">Keluar</span>
                    </button>
                </aside>

                <main class="flex-1 flex flex-col overflow-hidden">
                    <header class="h-16 lg:h-20 bg-white/80 backdrop-blur-md border-b px-6 lg:px-10 flex items-center justify-between sticky top-0 z-10">
                        <div class="flex flex-col">
                            <h2 class="font-black text-slate-800 uppercase text-sm tracking-widest">${state.activeTab}</h2>
                            <p class="text-[10px] font-bold text-green-600 uppercase tracking-tight">${state.user.satker}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="hidden sm:flex flex-col items-end">
                                <span class="text-xs font-bold text-slate-800">${state.user.name}</span>
                                <span class="text-[9px] font-bold text-slate-400 uppercase">${state.user.jabatan}</span>
                            </div>
                            <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center text-white font-bold text-sm shadow-md">
                                ${state.user.name.charAt(0)}
                            </div>
                        </div>
                    </header>
                    <div class="flex-1 overflow-y-auto p-4 md:p-8 lg:p-10">
                        ${renderContent()}
                    </div>
                </main>
            </div>`;
        }

        function renderNav(id, icon, label) {
            const active = state.activeTab === id ? 'sidebar-active shadow-sm' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-50';
            return `<button onclick="switchTab('${id}')" class="flex-1 md:flex-none flex items-center justify-center lg:justify-start gap-3 p-3 lg:p-4 rounded-2xl transition-all ${active}">
                <i data-lucide="${icon}" class="w-5 h-5"></i><span class="hidden lg:block text-sm font-bold">${label}</span>
            </button>`;
        }

        function renderContent() {
            if (state.activeTab === 'home') return renderHome();
            if (state.activeTab === 'disposisi') return state.user.role === 'admin' ? renderAdminDisp() : renderPegawaiDisp();
            if (state.activeTab === 'laporan') return state.user.role === 'admin' ? renderAdminLap() : renderPegawaiLap();
            if (state.activeTab === 'verif') return renderAdminVerif();
        }

        function getPerf(uid) {
            const userReps = state.reports.filter(r => r.pegawaiId === uid);
            if (!userReps.length) return "N/A";
            const map = { "Sangat Baik": 100, "Baik": 80, "Cukup": 60, "": 0 };
            const scores = userReps.map(r => map[r.penilaian] || 0).filter(s => s > 0);
            if (!scores.length) return "Belum Dinilai";
            const avg = scores.reduce((a,b)=>a+b,0)/scores.length;
            return avg >= 90 ? "Sangat Baik" : (avg >= 75 ? "Baik" : "Cukup");
        }

        function renderHome() {
            const isAdmin = state.user.role === 'admin';
            if (isAdmin) {
                const myPeg = state.users.filter(u => u.satker === state.user.satker && u.role === 'pegawai' && u.status === 'verified');
                return `
                <div class="space-y-6">
                    <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm flex flex-col md:flex-row justify-between items-center gap-6">
                        <div>
                            <h3 class="text-2xl font-black text-slate-800">Panel Admin ${state.user.satker}</h3>
                            <p class="text-slate-400 text-sm">Monitoring kinerja pegawai secara real-time.</p>
                        </div>
                        <div class="flex gap-4">
                            <div class="bg-green-50 px-6 py-4 rounded-2xl text-center">
                                <div class="text-2xl font-black text-green-700">${myPeg.length}</div>
                                <div class="text-[9px] font-bold text-green-600 uppercase tracking-widest">Pegawai Aktif</div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-[2rem] border border-slate-100 shadow-sm overflow-hidden">
                        <div class="p-6 border-b bg-slate-50/50 flex items-center gap-2">
                            <i data-lucide="bar-chart-3" class="w-4 h-4 text-slate-400"></i>
                            <span class="text-xs font-black text-slate-500 uppercase tracking-widest">Daftar Kinerja Pegawai</span>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm">
                                <thead class="bg-white border-b text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                    <tr><th class="p-6">Nama & NIP</th><th class="p-6">Jabatan</th><th class="p-6 text-center">Matriks Kinerja</th></tr>
                                </thead>
                                <tbody class="divide-y divide-slate-50">
                                    ${myPeg.map(u => `
                                    <tr class="hover:bg-slate-50/50 transition-colors">
                                        <td class="p-6"><div class="font-bold text-slate-800">${u.name}</div><div class="text-[10px] text-slate-400">${u.nip}</div></td>
                                        <td class="p-6 text-slate-500 text-xs">${u.jabatan}</td>
                                        <td class="p-6 text-center">
                                            <span class="px-3 py-1 bg-emerald-50 text-emerald-600 rounded-lg font-black text-[10px] uppercase">${getPerf(u.id)}</span>
                                        </td>
                                    </tr>`).join('') || `<tr><td colspan="3" class="p-12 text-center text-slate-300 italic">Belum ada pegawai terdaftar</td></tr>`}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>`;
            }
            return `
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="md:col-span-2 bg-white p-10 rounded-[2rem] border border-slate-100 shadow-sm relative overflow-hidden">
                    <div class="relative z-10">
                        <h3 class="text-3xl font-black text-slate-800 mb-2">Selamat Datang, ${state.user.name}</h3>
                        <p class="text-slate-400 text-sm mb-8 leading-relaxed">Anda terdaftar di Satker <b>${state.user.satker}</b>.<br>Silakan laporkan kegiatan harian atau cek disposisi tugas Anda.</p>
                        <div class="flex gap-2">
                            <span class="px-4 py-2 bg-slate-100 rounded-xl text-[10px] font-bold text-slate-500 uppercase">${state.user.golongan}</span>
                            <span class="px-4 py-2 bg-blue-50 rounded-xl text-[10px] font-bold text-blue-500 uppercase">${state.user.nip}</span>
                        </div>
                    </div>
                    <i data-lucide="sparkles" class="absolute -bottom-10 -right-10 w-40 h-40 text-slate-50 opacity-50"></i>
                </div>
                <div class="bg-gradient-to-br from-green-600 to-emerald-700 p-10 rounded-[2rem] shadow-xl text-white flex flex-col items-center justify-center text-center">
                    <span class="text-[10px] font-bold opacity-60 uppercase tracking-[0.2em] mb-4">Matriks Kinerja</span>
                    <div class="text-3xl font-black tracking-tight mb-2">${getPerf(state.user.id)}</div>
                    <div class="w-12 h-1 border-b border-white/20 mb-4"></div>
                    <p class="text-[10px] opacity-80 leading-relaxed font-medium">Berdasarkan akumulasi penilaian laporan harian dan tugas disposisi.</p>
                </div>
            </div>`;
        }

        function renderAdminDisp() {
            const myPeg = state.users.filter(u => u.satker === state.user.satker && u.role === 'pegawai' && u.status === 'verified');
            return `
            <div class="space-y-8">
                <form onsubmit="handleCreateTask(event)" class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm space-y-6">
                    <h4 class="font-black text-slate-800 flex items-center gap-2"><i data-lucide="plus-circle" class="w-5 h-5 text-green-600"></i> Kirim Disposisi Baru</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Pilih Pegawai</label>
                            <select id="t-peg" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm font-bold" required>
                                ${myPeg.map(u=>`<option value="${u.id}">${u.name} (${u.jabatan})</option>`).join('')}
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Nama Tugas / Surat</label>
                            <input id="t-name" type="text" placeholder="Contoh: Panitia Hari Santri" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm" required>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Link Berkas (Google Drive/Lainnya)</label>
                            <input id="t-file" type="url" placeholder="https://..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm" required>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Batas Waktu</label>
                            <input id="t-date" type="date" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm" required>
                        </div>
                    </div>
                    <button class="w-full bg-slate-800 hover:bg-black text-white font-bold py-4 rounded-2xl transition-all shadow-lg">Kirim Disposisi Sekarang</button>
                </form>

                <div class="bg-white rounded-[2rem] border border-slate-100 shadow-sm overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-50/50 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b">
                                <tr><th class="p-6">Tugas</th><th class="p-6">Penerima</th><th class="p-6">Status</th><th class="p-6">Bukti</th><th class="p-6">Nilai</th></tr>
                            </thead>
                            <tbody class="divide-y divide-slate-50">
                                ${state.tasks.filter(t=>t.satker===state.user.satker).map(t=>`
                                <tr class="hover:bg-slate-50/30">
                                    <td class="p-6 font-bold text-slate-800">${t.name}<br><span class="text-[9px] text-slate-400">Deadline: ${t.deadline}</span></td>
                                    <td class="p-6 text-xs text-slate-500">${state.users.find(u=>u.id===t.pegawaiId)?.name || 'N/A'}</td>
                                    <td class="p-6"><span class="px-2 py-1 ${t.status==='Selesai'?'bg-blue-50 text-blue-600':'bg-amber-50 text-amber-600'} rounded text-[9px] font-black uppercase">${t.status}</span></td>
                                    <td class="p-6">${t.buktiDukung?`<a href="${t.buktiDukung}" target="_blank" class="text-green-600 hover:underline flex items-center gap-1 font-bold text-xs"><i data-lucide="external-link" class="w-3 h-3"></i> Buka</a>`:'-'}</td>
                                    <td class="p-6">
                                        <select onchange="nilaiTugas('${t.id}', this.value)" class="text-[10px] font-bold border rounded-lg p-1 outline-none">
                                            <option value="">Nilai</option>
                                            <option value="A" ${t.nilai==='A'?'selected':''}>A</option>
                                            <option value="B" ${t.nilai==='B'?'selected':''}>B</option>
                                        </select>
                                    </td>
                                </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>`;
        }

        function renderPegawaiDisp() {
            const myTasks = state.tasks.filter(t=>t.pegawaiId===state.user.id);
            return `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                ${myTasks.map(t=>`
                <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm space-y-6">
                    <div class="flex justify-between items-start">
                        <h4 class="font-black text-slate-800 text-lg leading-tight">${t.name}</h4>
                        <span class="text-[9px] font-black px-2 py-1 bg-slate-100 rounded uppercase">${t.status}</span>
                    </div>
                    <div class="p-4 bg-slate-50 rounded-2xl flex items-center justify-between">
                        <div class="flex flex-col"><span class="text-[9px] font-bold text-slate-400 uppercase">Deadline</span><span class="text-xs font-bold">${t.deadline}</span></div>
                        <a href="${t.fileLink}" target="_blank" class="bg-white border p-2 rounded-xl shadow-sm text-blue-600 hover:bg-blue-50 transition-colors"><i data-lucide="file-text"></i></a>
                    </div>
                    ${t.status !== 'Selesai' ? `
                    <div class="space-y-3">
                        <input id="b-${t.id}" type="url" placeholder="Masukkan Link Bukti Pekerjaan" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-xs outline-none focus:ring-2 focus:ring-green-500">
                        <button onclick="submitBukti('${t.id}')" class="w-full bg-green-600 text-white font-bold py-3 rounded-2xl shadow-lg active:scale-95 transition-all text-sm">Laporkan Selesai</button>
                    </div>` : `
                    <div class="flex items-center gap-2 p-4 bg-green-50 rounded-2xl">
                        <i data-lucide="check-circle" class="text-green-600 w-5 h-5"></i>
                        <div><p class="text-[9px] font-bold text-green-700 uppercase">Tugas Selesai</p><p class="text-xs font-bold text-slate-700">Menunggu penilaian admin</p></div>
                    </div>`}
                </div>`).join('') || `<div class="col-span-full py-20 text-center"><i data-lucide="inbox" class="w-12 h-12 mx-auto text-slate-200 mb-4"></i><p class="text-slate-400 italic font-medium">Belum ada tugas disposisi untuk Anda.</p></div>`}
            </div>`;
        }

        function renderPegawaiLap() {
            return `
            <div class="space-y-8">
                <form onsubmit="handleCreateReport(event)" class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm space-y-6 max-w-2xl mx-auto">
                    <h4 class="font-black text-slate-800">Laporan Kegiatan Harian</h4>
                    <div class="grid grid-cols-2 gap-4">
                        <input id="rep-date" type="date" class="p-4 bg-slate-50 border rounded-2xl text-sm" required>
                        <input id="rep-time" type="time" class="p-4 bg-slate-50 border rounded-2xl text-sm" required>
                    </div>
                    <textarea id="rep-act" placeholder="Deskripsikan kegiatan Anda..." class="w-full p-4 bg-slate-50 border rounded-2xl text-sm h-32 outline-none" required></textarea>
                    <input id="rep-link" type="url" placeholder="Link Bukti Kegiatan (Opsional)" class="w-full p-4 bg-slate-50 border rounded-2xl text-sm" required>
                    <button class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg">Simpan Laporan Harian</button>
                </form>
                <div class="space-y-4 max-w-2xl mx-auto">
                    ${state.reports.filter(r=>r.pegawaiId===state.user.id).map(r=>`
                    <div class="bg-white p-6 rounded-2xl border border-slate-100 flex justify-between items-center group hover:border-blue-200 transition-all">
                        <div class="flex flex-col gap-1">
                            <span class="text-[9px] font-bold text-slate-400 uppercase">${r.date} | ${r.time}</span>
                            <p class="text-sm font-bold text-slate-700 leading-tight">${r.activity}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] font-black text-blue-600 uppercase tracking-tighter">${r.penilaian || 'Menunggu'}</span>
                        </div>
                    </div>`).join('')}
                </div>
            </div>`;
        }

        function renderAdminLap() {
            return `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                ${state.reports.filter(r=>r.satker===state.user.satker).map(r=>{
                    const p = state.users.find(u=>u.id===r.pegawaiId);
                    return `
                    <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow flex flex-col justify-between gap-6">
                        <div class="space-y-4">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center font-bold text-slate-500 text-[10px]">${p?.name?.charAt(0)}</div>
                                <div><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${p?.name}</p><p class="text-[9px] font-bold text-slate-300 uppercase">${r.date}</p></div>
                            </div>
                            <p class="text-sm font-medium text-slate-800 line-clamp-3">${r.activity}</p>
                            <a href="${r.buktiLink}" target="_blank" class="text-blue-500 text-[10px] font-bold uppercase flex items-center gap-1 hover:underline"><i data-lucide="link" class="w-3 h-3"></i> Lihat Bukti</a>
                        </div>
                        <div class="pt-4 border-t flex items-center justify-between">
                            <span class="text-[9px] font-black text-slate-400 uppercase">Nilai Laporan</span>
                            <select onchange="nilaiLaporan('${r.id}', this.value)" class="text-[10px] font-bold border rounded-lg p-1 outline-none bg-slate-50">
                                <option value="">Pilih</option>
                                <option value="Sangat Baik" ${r.penilaian==='Sangat Baik'?'selected':''}>Sangat Baik</option>
                                <option value="Baik" ${r.penilaian==='Baik'?'selected':''}>Baik</option>
                                <option value="Cukup" ${r.penilaian==='Cukup'?'selected':''}>Cukup</option>
                            </select>
                        </div>
                    </div>`;
                }).join('') || `<div class="col-span-full py-20 text-center"><p class="text-slate-400 italic">Belum ada laporan masuk.</p></div>`}
            </div>`;
        }

        function renderAdminVerif() {
            const pending = state.users.filter(u => u.satker === state.user.satker && u.role === 'pegawai');
            return `
            <div class="bg-white rounded-[2rem] border border-slate-100 shadow-sm overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50/50 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b">
                        <tr><th class="p-6">Calon Pegawai</th><th class="p-6">Status</th><th class="p-6 text-right">Aksi</th></tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50">
                        ${pending.map(u=>`
                        <tr class="hover:bg-slate-50/20 transition-all">
                            <td class="p-6">
                                <div class="font-bold text-slate-800">${u.name}</div>
                                <div class="text-[10px] text-slate-400">${u.nip} | ${u.jabatan} (${u.golongan})</div>
                            </td>
                            <td class="p-6"><span class="px-2 py-1 ${u.status==='pending'?'bg-amber-50 text-amber-600':'bg-green-50 text-green-600'} rounded text-[9px] font-black uppercase">${u.status}</span></td>
                            <td class="p-6 text-right space-x-2">
                                ${u.status==='pending' ? `<button onclick="verifUser('${u.id}', 'ver')" class="bg-green-600 text-white px-4 py-2 rounded-xl font-bold text-[10px] shadow-lg shadow-green-100">AKTIVASI</button>` : ''}
                                <button onclick="verifUser('${u.id}', 'del')" class="text-red-500 hover:text-red-700 font-bold text-[10px] uppercase p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </td>
                        </tr>`).join('') || `<tr><td colspan="3" class="p-12 text-center text-slate-300 italic">Tidak ada antrean pendaftaran</td></tr>`}
                    </tbody>
                </table>
            </div>`;
        }

        function renderPending() {
            return `
            <div class="bg-white p-12 rounded-[2.5rem] shadow-2xl text-center max-w-md border border-slate-100 flex flex-col items-center">
                <div class="w-20 h-20 bg-amber-50 rounded-3xl flex items-center justify-center text-amber-500 mb-8 border border-amber-100 animate-pulse">
                    <i data-lucide="clock" class="w-10 h-10"></i>
                </div>
                <h2 class="text-2xl font-black text-slate-800 mb-3 tracking-tight">Akun Belum Aktif</h2>
                <p class="text-slate-400 text-sm mb-10 leading-relaxed font-medium">Pendaftaran Anda sedang menunggu proses aktivasi oleh <b>Admin Satker ${state.user.satker}</b>.</p>
                <button onclick="logout()" class="w-full py-4 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-2xl font-bold transition-all flex items-center justify-center gap-2">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Kembali ke Login
                </button>
            </div>`;
        }

        window.navigate = (v) => { state.view = v; render(); };
        window.switchTab = (t) => { state.activeTab = t; render(); };
        window.logout = () => { state.user = null; state.view = 'login'; render(); };

        initApp();
    </script>
</body>
</html>
